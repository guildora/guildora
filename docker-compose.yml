services:
  db:
    image: postgres:16
    container_name: guildora-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: guildora
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guildora"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: guildora-web:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL}
      NUXT_PUBLIC_HUB_URL: ${NUXT_PUBLIC_HUB_URL}
      NUXT_PUBLIC_CMS_URL: ${NUXT_PUBLIC_CMS_URL}
    depends_on:
      cms:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      caddy: ${APP_HOST}
      caddy.reverse_proxy: "{{upstreams 3000}}"
    networks:
      - internal
      - caddy

  hub:
    build:
      context: .
      dockerfile: apps/hub/Dockerfile
    image: guildora-hub:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/guildora
      DATABASE_SSL: "false"
      NUXT_OAUTH_DISCORD_CLIENT_ID: ${NUXT_OAUTH_DISCORD_CLIENT_ID}
      NUXT_OAUTH_DISCORD_CLIENT_SECRET: ${NUXT_OAUTH_DISCORD_CLIENT_SECRET}
      NUXT_OAUTH_DISCORD_REDIRECT_URI: ${NUXT_OAUTH_DISCORD_REDIRECT_URI}
      NUXT_PUBLIC_HUB_URL: ${NUXT_PUBLIC_HUB_URL}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL}
      NUXT_PUBLIC_CMS_URL: ${NUXT_PUBLIC_CMS_URL}
      PAYLOAD_INTERNAL_URL: http://cms:3001
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
      NUXT_PUBLIC_DEFAULT_THEME: ${NUXT_PUBLIC_DEFAULT_THEME:-retrofuturism}
      BUCKET_PROVIDER: ${BUCKET_PROVIDER:-}
      BUCKET_ENDPOINT: ${BUCKET_ENDPOINT:-}
      BUCKET_REGION: ${BUCKET_REGION:-}
      BUCKET_NAME: ${BUCKET_NAME:-}
      BUCKET_ACCESS_KEY_ID: ${BUCKET_ACCESS_KEY_ID:-}
      BUCKET_SECRET_ACCESS_KEY: ${BUCKET_SECRET_ACCESS_KEY:-}
      BUCKET_PUBLIC_URL: ${BUCKET_PUBLIC_URL:-}
      BUCKET_PATH_PREFIX: ${BUCKET_PATH_PREFIX:-}
    depends_on:
      cms:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      caddy: ${HUB_HOST}
      caddy.reverse_proxy: "{{upstreams 3003}}"
    networks:
      - internal
      - caddy

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    image: guildora-cms:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/guildora
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL}
      NUXT_PUBLIC_HUB_URL: ${NUXT_PUBLIC_HUB_URL}
      BUCKET_PROVIDER: ${BUCKET_PROVIDER:-}
      BUCKET_ENDPOINT: ${BUCKET_ENDPOINT:-}
      BUCKET_REGION: ${BUCKET_REGION:-}
      BUCKET_NAME: ${BUCKET_NAME:-}
      BUCKET_ACCESS_KEY_ID: ${BUCKET_ACCESS_KEY_ID:-}
      BUCKET_SECRET_ACCESS_KEY: ${BUCKET_SECRET_ACCESS_KEY:-}
      BUCKET_PUBLIC_URL: ${BUCKET_PUBLIC_URL:-}
      BUCKET_PATH_PREFIX: ${BUCKET_PATH_PREFIX:-}
    volumes:
      - cms_media:/app/apps/cms/media
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/admin').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      caddy: ${CMS_HOST}
      caddy.reverse_proxy: "{{upstreams 3001}}"
    networks:
      - internal
      - caddy

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    image: guildora-bot:latest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/guildora
      DATABASE_SSL: "false"
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      BOT_INTERNAL_TOKEN: ${BOT_INTERNAL_TOKEN}
      BOT_INTERNAL_PORT: ${BOT_INTERNAL_PORT:-3050}
    networks:
      - internal

volumes:
  db_data:
  cms_media:

networks:
  internal:
    driver: bridge
  caddy:
    external: true
    name: ${CADDY_NETWORK:-caddy}
